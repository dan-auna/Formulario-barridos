<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Auna — Portal de Asesores</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <!-- PANTALLA LOGIN -->
  <section id="login-section" class="screen active">
    <div class="login-container">
      <div class="login-card">
        <img src="https://res.cloudinary.com/dwxiuavqd/image/upload/v1774998253/468951353_1098106335437147_8489372296479282912_n_insezr.jpg" alt="Auna" class="login-logo">
        <h1>Bienvenido Asesor</h1>
        <p>Gestiona tus leads de salud con Auna</p>
        
        <div class="field-group">
          <input type="text" id="username" placeholder="Usuario" autocomplete="username">
        </div>
        <div class="field-group">
          <input type="password" id="password" placeholder="Contraseña">
        </div>
        <div id="login-error" class="error-msg" style="display:none">Credenciales incorrectas</div>
        <button class="btn-primary" id="login-btn" onclick="login()">Iniciar Sesión</button>
      </div>
    </div>
  </section>

  <!-- PANTALLA DASHBOARD -->
  <section id="form-section" class="screen" style="display:none">
    <nav class="topbar">
      <div class="user-info">
        <div class="avatar" id="user-avatar">?</div>
        <span id="user-name-chip">Cargando...</span>
      </div>
      <button class="logout-link" onclick="logout()">Cerrar sesión</button>
    </nav>

    <div class="main-container">
      <header class="page-header">
        <h2 id="form-title">Formulario Barrido</h2>
        <p>Registra y gestiona tus nuevos prospectos</p>
      </header>

      <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('form')">Nuevo Lead</button>
        <button class="tab-btn" onclick="switchTab('records')">Mis Registros</button>
        <button class="tab-btn" onclick="switchTab('encuesta')">QR Encuesta</button>
      </div>

      <!-- PANEL FORMULARIO -->
      <div id="panel-form" class="tab-panel active">
        <div class="card">
          <form id="barrido-form">
            <div class="grid-form">
              <div class="field">
                <label>Nombre y Apellido</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Perez" required>
              </div>
              <div class="field">
                <label>Teléfono</label>
                <input type="tel" id="telefono" maxlength="9" placeholder="987654321" required>
              </div>
              <div class="field">
                <label>Edad</label>
                <input type="number" id="edad" placeholder="Ej: 30" required>
              </div>
              <div class="field">
                <label>Producto</label>
                <select id="producto" required>
                  <option value="">Selecciona...</option>
                  <option value="Auna Classic">Auna Classic</option>
                  <option value="Auna Premium">Auna Premium</option>
                  <option value="Auna Senior">Auna Senior</option>
                  <option value="Onco Pro">Onco Pro</option>
                  <option value="Onco Plus">Onco Plus</option>
                </select>
              </div>
              <div class="field full">
                <label>Comentarios</label>
                <textarea id="comentarios" rows="3"></textarea>
              </div>
            </div>
            <button type="submit" class="btn-primary" id="submit-btn">Guardar Lead</button>
          </form>
        </div>
      </div>

      <!-- PANEL REGISTROS -->
      <div id="panel-records" class="tab-panel">
        <div class="card no-padding">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Buscar por nombre o producto..." oninput="filtrarTabla()">
          </div>
          <div id="tabla-registros" class="responsive-table">
            <!-- La tabla se genera por JS -->
          </div>
        </div>
      </div>

      <!-- PANEL ENCUESTA -->
      <div id="panel-encuesta" class="tab-panel">
        <div class="card qr-center">
          <h3>Tu código personal</h3>
          <p>Muestra este QR a tu cliente para que él mismo llene sus datos.</p>
          <div id="qr-container"></div>
          <div class="link-display" id="encuesta-link-text"></div>
          <button class="btn-secondary" onclick="copiarLink()">Copiar Enlace</button>
        </div>
      </div>
    </div>
  </section>

  <!-- MODAL EDICIÓN -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <h3>Editar Información</h3>
      <input type="hidden" id="edit-row-index">
      <div class="grid-form">
        <div class="field">
            <label>Nombre</label>
            <input type="text" id="edit-nombre">
        </div>
        <div class="field">
            <label>Teléfono</label>
            <input type="tel" id="edit-telefono" maxlength="9">
        </div>
        <div class="field">
            <label>Edad</label>
            <input type="number" id="edit-edad">
        </div>
        <div class="field">
            <label>Producto</label>
            <select id="edit-producto">
                <option value="Auna Classic">Auna Classic</option>
                <option value="Auna Premium">Auna Premium</option>
                <option value="Auna Senior">Auna Senior</option>
                <option value="Onco Pro">Onco Pro</option>
                <option value="Onco Plus">Onco Plus</option>
            </select>
        </div>
        <div class="field full">
            <label>Comentarios</label>
            <textarea id="edit-comentarios" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarEdicion()">Actualizar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Guardado con éxito</div>

  <script src="script.js"></script>
</body>
</html>
