<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Barrido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-section" class="container">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="form-section" class="container" style="display:none;">
        <h2 id="form-title">Formulario Barrido</h2>
        <form id="barrido-form">
            <input type="text" id="nombre" placeholder="Nombre y Apellido" required>
            <input type="tel" id="telefono" placeholder="Número de teléfono" required>
            <input type="number" id="edad" placeholder="Edad" required>
            
            <select id="producto">
                <option value="Auna Classic">Auna Classic</option>
                <option value="Auna Premium">Auna Premium</option>
                <option value="Auna Senior">Auna Senior</option>
                <option value="Onco Pro">Onco Pro</option>
                <option value="Onco Plus">Onco Plus</option>
            </select>

            <textarea id="comentarios" placeholder="Comentarios"></textarea>
            
            <button type="submit">Guardar Registro</button>
        </form>
        <hr>
        <button onclick="verRegistros()">Ver Mis Registros</button>
        <div id="tabla-registros"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
