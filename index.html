<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - Auna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-section" class="container">
        <img src="https://res.cloudinary.com/dwxiuavqd/image/upload/v1774998253/468951353_1098106335437147_8489372296479282912_n_insezr.jpg" alt="Logo Auna" class="logo">
        <h2>Ingreso Asesores</h2>
        <input type="text" id="username" placeholder="Tu usuario">
        <input type="password" id="password" placeholder="Tu contraseña">
        <button onclick="login()">Iniciar Sesión</button>
    </div>

    <div id="form-section" class="container" style="display:none; max-width: 600px;">
        <img src="https://res.cloudinary.com/dwxiuavqd/image/upload/v1774998253/468951353_1098106335437147_8489372296479282912_n_insezr.jpg" alt="Logo Auna" class="logo" style="width:120px;">
        <h2 id="form-title">Formulario de Barrido</h2>
        
        <form id="barrido-form">
            <input type="text" id="nombre" placeholder="Nombre completo del cliente" required>
            <div style="display: flex; gap: 10px;">
                <input type="tel" id="telefono" placeholder="Teléfono" required>
                <input type="number" id="edad" placeholder="Edad" required>
            </div>
            
            <select id="producto" required>
                <option value="" disabled selected>Selecciona un producto</option>
                <option value="Auna Classic">Auna Classic</option>
                <option value="Auna Premium">Auna Premium</option>
                <option value="Auna Senior">Auna Senior</option>
                <option value="Onco Pro">Onco Pro</option>
                <option value="Onco Plus">Onco Plus</option>
            </select>

            <textarea id="comentarios" rows="3" placeholder="Observaciones adicionales..."></textarea>
            
            <button type="submit">Registrar Lead</button>
        </form>

        <button class="secondary-btn" onclick="verRegistros()">Consultar Mis Registros</button>
        <div id="tabla-registros"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
