<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesoría Gratuita — Auna</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #002d72; color: white; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; }
        h2 { color: #002d72; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #007bc3; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .success { display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="card" id="form-container">
        <h2>Solicitar Asesoría</h2>
        <p>Déjanos tus datos y un especialista Auna te contactará.</p>
        <form id="public-form">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="tel" id="telefono" maxlength="9" placeholder="Teléfono" required>
            <input type="number" id="edad" placeholder="Tu edad" required>
            <select id="seguro">
                <option value="">¿Tienes seguro oncológico?</option>
                <option value="Sí">Sí</option>
                <option value="No">No</option>
            </select>
            <button type="submit" id="send-btn">Enviar datos</button>
        </form>
    </div>
    <div class="card success" id="success-msg">
        <h2>¡Gracias!</h2>
        <p>Tus datos han sido enviados al asesor. Pronto nos comunicaremos contigo.</p>
    </div>

    <script>
        const URL_GS = "TU_URL_DE_APPS_SCRIPT";
        const urlParams = new URLSearchParams(window.location.search);
        const USUARIO_ASIGNADO = urlParams.get('u') || 'web-directo';

        document.getElementById("public-form").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("send-btn");
            btn.disabled = true;
            btn.innerText = "Enviando...";

            const datos = {
                usuario: USUARIO_ASIGNADO,
                fecha: new Date().toLocaleString("es-PE", {timeZone: "America/Lima"}),
                nombre: document.getElementById("nombre").value,
                telefono: document.getElementById("telefono").value,
                edad: document.getElementById("edad").value,
                producto: "Interés Web/QR",
                comentarios: "¿Tiene seguro?: " + document.getElementById("seguro").value
            };

            await fetch(URL_GS, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(datos)
            });

            document.getElementById("form-container").style.display = "none";
            document.getElementById("success-msg").style.display = "block";
        };
    </script>
</body>
</html>
